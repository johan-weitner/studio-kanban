app = "studio-kanban"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DATABASE_URL = "/data/studio-kanban.db"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
