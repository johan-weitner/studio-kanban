# fly.toml app configuration file generated for studio-kanban-verdant-harborlight-7283 on 2026-07-21T16:31:05+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'studio-kanban-verdant-harborlight-7283'
primary_region = 'arn'

[build]
[env]
  DATABASE_URL = '/data/studio-kanban.db'
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
