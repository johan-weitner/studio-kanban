# Demo instance — single-user, no auth (deployed from single-user-demo branch)
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'studio-kanban'
primary_region = 'arn'

[build]
[env]
  DATABASE_URL = '/data/studio-kanban.db'
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

